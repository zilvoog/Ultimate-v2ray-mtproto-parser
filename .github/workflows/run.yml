name: Fetch and Check Configs (No-Account Version)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests aiohttp aiohttp-socks

    # Шаг 1: Запуск нового веб-парсера (аккаунт не требуется!)
    - name: Run Web Config Fetcher
      run: parserv2.py

    # Шаг 2: Запуск HTTP-чекера и публикатора
    - name: Run HTTP Checker & Publisher
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.8624370798:AAGT0Bxx73nINuwYO1rzgjuUvF78cPpvg_k }}
      run: checker.py

    # Шаг 3: Сохранение подписок в GitHub
    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Config/ sub/ || true
        git commit -m "🔄 Update configs: $(date -u +'%Y-%m-%d %H:%M:%S' UTC)" || exit 0
        git push
