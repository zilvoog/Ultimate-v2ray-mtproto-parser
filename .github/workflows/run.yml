name: Parser and Checker

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install aiohttp aiohttp-socks
      
      - name: Run parser
        run: python parserv2.py
      
      - name: Run checkers
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python checker.py
          python checker_mtproto.py
      
      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add Config/ || true
          git commit -m "update" || exit 0
          git push
