name: Fetch and Check Configs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests aiohttp aiohttp-socks

    - name: Run Web Config Fetcher
      run: python parserv3.py

    - name: Run Checkers & Publishers
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      run: |
        python checker.py
        python checker_mtproto.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Config/ || true
        git commit -m "🔄 Update configs: $(date -u +'%Y-%m-%d %H:%M:%S')" || exit 0
        git push
